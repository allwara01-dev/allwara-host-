<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allwara - Host Panel (Firebase Sync)</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --header-bg: #2c3e50;
            --header-text: #fff;
            --card-bg: #fff;
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border: #ccc;
        }

        /* Dark Mode Theme */
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f1f1f1;
            --header-bg: #111;
            --card-bg: #2d2d2d;
            --border: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); transition: background 0.3s; }

        /* Login Screen */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: #fff; padding: 30px; border-radius: 8px; width: 350px; text-align: center; color: #333;
        }
        .login-box input {
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;
        }
        .login-box button {
            width: 100%; padding: 10px; background: #3498db; color: #fff; border: none; border-radius: 5px; cursor: pointer;
        }

        /* Top Header */
        header {
            background-color: var(--header-bg); color: var(--header-text);
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
        }
        .menu-logo { display: flex; align-items: center; gap: 15px; font-size: 24px; }
        .search-bar input {
            padding: 8px; border-radius: 4px; border: none; outline: none; width: 250px;
        }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; left: -300px; width: 250px; height: 100%;
            background-color: var(--header-bg); color: var(--header-text);
            transition: 0.3s; z-index: 1000; padding-top: 60px;
        }
        #sidebar.active { left: 0; }
        #sidebar a {
            display: block; padding: 15px 20px; color: var(--header-text);
            text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 18px; cursor: pointer;
        }
        #sidebar a:hover { background: rgba(255,255,255,0.2); }
        .close-sidebar { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }

        /* Main Content */
        main { padding: 20px; max-width: 1200px; margin: auto; }
        
        .filter-section {
            background: var(--card-bg); padding: 15px; border-radius: 8px;
            display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); align-items: center;
        }
        .filter-section select, .filter-section input {
            padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-color); color: var(--text-color);
        }
        .btn-add { background: var(--success); color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Folders/Cards */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card {
            background: var(--card-bg); border-radius: 8px; padding: 15px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; border: 1px solid var(--border); position: relative;
        }
        .card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #ccc; }
        .card h3 { margin-bottom: 5px; }
        .hidden-badge { position: absolute; top: 10px; right: 10px; background: var(--danger); color: #fff; font-size: 12px; padding: 2px 5px; border-radius: 3px; }

        /* Modal / Form */
        #artisanModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 800px; border-radius: 8px; padding: 20px; max-height: 90vh; overflow-y: auto; position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: var(--danger); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: bold; font-size: 14px;}
        .form-group input, .form-group textarea, .form-group select {
            padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-color); color: var(--text-color);
        }
        .form-full { grid-column: span 2; }
        .product-img-group { display: flex; gap: 5px; margin-bottom: 5px; }
        .product-img-group input { width: 100%; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: #fff; }
        .btn-save { background: var(--primary); width: 100%; margin-top: 20px; font-size: 16px; font-weight:bold; }
        .btn-delete { background: var(--danger); margin-top: 10px; width: 100%; font-weight:bold;}
        .btn-toggle-hide { background: orange; margin-top: 10px; width: 100%; color: black; font-weight:bold;}
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-box">
            <h2>Host Login</h2>
            <p style="margin-bottom:15px; font-size:12px; color:#666;">ID: allwara | Pass: rahe6799</p>
            <input type="text" id="loginId" placeholder="User ID">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="checkLogin()">Login</button>
        </div>
    </div>

    <!-- Application UI (Hidden initially) -->
    <div id="appContainer" style="display: none;">
        
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="close-sidebar" onclick="toggleSidebar()">&times;</div>
            <a onclick="toggleTheme()"><i class="fas fa-moon"></i> Toggle Dark Mode</a>
            <a href="mailto:allwara@gmail.com"><i class="fas fa-envelope"></i> Help (Email)</a>
            <a onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>

        <!-- Header -->
        <header>
            <div class="menu-logo">
                <i class="fas fa-bars menu-btn" onclick="toggleSidebar()" style="cursor:pointer;"></i>
                <span><b>allwara</b> <small>| Host Panel</small></span>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search user name..." oninput="renderData()">
            </div>
        </header>

        <!-- Main Dashboard -->
        <main>
            <div class="filter-section">
                <strong>Filters:</strong>
                <select id="filterCategory" onchange="renderData()">
                    <option value="All">All Categories</option>
                    <option value="Bags">Bags</option>
                    <option value="Apparel">Apparels</option>
                    <option value="Jewellery">Jewellery</option>
                    <option value="Footwear">Footwear</option>
                </select>

                <strong>Location:</strong>
                <input type="text" value="India" readonly disabled style="width: 80px;">
                <input type="number" id="pincodeFilter" placeholder="Enter Pincode" onkeyup="autoFillLocation()" style="width:130px;">
                <select id="filterState" onchange="renderData()">
                    <option value="">Select State</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Delhi">Delhi</option>
                </select>
                <select id="filterDistrict" onchange="renderData()">
                    <option value="">Select District</option>
                </select>

                <button class="btn-add" onclick="openFolder(null)"><i class="fas fa-plus"></i> Add New Data</button>
            </div>

            <!-- Loader indicator for DB Fetching -->
            <p id="dataLoader" style="display:none; text-align:center;"><b>Loading database from Firebase...</b></p>
            
            <div class="grid-container" id="dataList">
                <!-- Data populated dynamically by Firebase Event -->
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="artisanModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeFolder()">&times;</span>
            <h2 id="modalTitle">Data Folder</h2>
            <input type="hidden" id="formId">
            
            <div class="form-grid">
                <!-- Location Categories -->
                <div class="form-group">
                    <label>Category *</label>
                    <select id="formCategory">
                        <option value="Bags">Bags</option>
                        <option value="Apparel">Apparels</option>
                        <option value="Jewellery">Jewellery</option>
                        <option value="Footwear">Footwear</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pincode *</label>
                    <input type="number" id="formPincode" placeholder="e.g. 302001">
                </div>
                <div class="form-group">
                    <label>State *</label>
                    <select id="formState">
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Delhi">Delhi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>District *</label>
                    <input type="text" id="formDistrict" placeholder="e.g. Jaipur">
                </div>

                <hr class="form-full">

                <!-- Real Prompnt Fields -->
                <div class="form-group">
                    <label>1. Profile Image URL</label>
                    <input type="url" id="formImgUrl" placeholder="http://image.link...">
                </div>
                <div class="form-group">
                    <label>2. Full Name</label>
                    <input type="text" id="formName" placeholder="Seller Name">
                </div>
                <div class="form-group">
                    <label>3. Dialing Number (Call)</label>
                    <input type="tel" id="formNumber" placeholder="9876543210">
                </div>
                <div class="form-group">
                    <label>4. WhatsApp Number</label>
                    <input type="tel" id="formWaNumber" placeholder="9876543210">
                </div>
                <div class="form-group">
                    <label>5. WhatsApp Group Link</label>
                    <input type="url" id="formWaGroup" placeholder="https://chat.whatsapp.com/...">
                </div>
                <div class="form-group">
                    <label>6. Map Location URL</label>
                    <input type="url" id="formMap" placeholder="https://maps.google.com/...">
                </div>
                <div class="form-group">
                    <label>7. Instagram URL</label>
                    <input type="url" id="formInsta" placeholder="https://instagram.com/...">
                </div>
                <div class="form-group">
                    <label>8. Facebook URL</label>
                    <input type="url" id="formFb" placeholder="https://facebook.com/...">
                </div>
                
                <div class="form-group form-full">
                    <label>9. Bio/Description</label>
                    <textarea id="formBio" rows="3" placeholder="Add custom text or description here..."></textarea>
                </div>

                <div class="form-group form-full">
                    <label>10. Product Images URLs</label>
                    <div id="productImagesContainer"></div>
                    <button class="btn" style="background:#27ae60; margin-top:5px; width: fit-content;" onclick="addProductImageInput()">+ Add Photo Link</button>
                </div>
            </div>

            <button class="btn btn-save" onclick="saveData()"><i class="fas fa-cloud-upload-alt"></i> Save & Upload to Database</button>
            <button class="btn btn-toggle-hide" id="btnToggleHide" onclick="toggleVisibility()" style="display:none;"></button>
            <button class="btn btn-delete" id="btnDelete" onclick="deleteData()" style="display:none;"><i class="fas fa-trash-alt"></i> Delete User Completely</button>
        </div>
    </div>


    <!-- 🔴 FIREBASE MODULAR SCRIPT SECTION 🔴 -->
    <script type="module">
        // Import Firebase Functions from the Modular CDN Setup
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Your Config
        const firebaseConfig = {
          apiKey: "AIzaSyDEfr7xM38sv2V36MdbY0dKs-MoOqaEBC4",
          authDomain: "allwara.firebaseapp.com",
          databaseURL: "https://allwara-default-rtdb.firebaseio.com",
          projectId: "allwara",
          storageBucket: "allwara.firebasestorage.app",
          messagingSenderId: "750105109586",
          appId: "1:750105109586:web:ed06d9be7fee6427032b8b"
        };

        // Init App and Database Connections
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Globals setup (Data List & Realtime sync arrays)
        window.artisansData = [];

        // DB Data Sync Event Listener! (Runs everytime data added/updated/deleted online)
        onValue(ref(db, 'allwaraSellersData'), (snapshot) => {
            const listData = [];
            snapshot.forEach((childNode) => {
                let singleRecord = childNode.val();
                singleRecord.dbID = childNode.key; 
                listData.push(singleRecord);
            });
            window.artisansData = listData;
            document.getElementById('dataLoader').style.display = 'none'; // hide loading
            window.renderData(); // Draw onto UI immediately
        }, (error) => { console.error("Database read failed: ", error); });


        // =============== CORE JAVASCRIPT & EXPOSING MODULE FUNCTIONS ================= //

        window.checkLogin = function() {
            const id = document.getElementById('loginId').value;
            const pass = document.getElementById('loginPass').value;
            if(id === 'allwara' && pass === 'rahe6799'){
                sessionStorage.setItem('isLoggedin', 'true');
                showPanel();
            } else { alert('Incorrect ID or Password!'); }
        }

        window.logout = function() {
            sessionStorage.removeItem('isLoggedin');
            location.reload();
        }

        function showPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('dataLoader').style.display = 'block'; // Start Loading tag
            applyTheme();
        }

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        window.toggleTheme = function() {
            const body = document.documentElement;
            if(body.getAttribute('data-theme') === 'dark'){
                body.setAttribute('data-theme', 'light');
                localStorage.setItem('themeStyle', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('themeStyle', 'dark');
            }
        }

        function applyTheme() {
            const t = localStorage.getItem('themeStyle');
            if(t) { document.documentElement.setAttribute('data-theme', t); }
        }

        // Pincode Dropdown Data Logic (Local UI enhancement)
        const dummyPincodes = {
            '30': { s: 'Rajasthan', d: 'Jaipur' }, '31': { s: 'Rajasthan', d: 'Udaipur' },
            '11': { s: 'Delhi', d: 'New Delhi' }, '40': { s: 'Maharashtra', d: 'Mumbai' },
            '38': { s: 'Gujarat', d: 'Ahmedabad' }
        };

        window.autoFillLocation = function() {
            const pin = document.getElementById('pincodeFilter').value;
            if(pin.length >= 2) {
                let code = pin.substring(0,2);
                if(dummyPincodes[code]){
                    document.getElementById('filterState').value = dummyPincodes[code].s;
                    document.getElementById('filterDistrict').innerHTML = `<option value="${dummyPincodes[code].d}">${dummyPincodes[code].d}</option>`;
                }
            } else if (pin.length === 0){
                document.getElementById('filterState').value = "";
                document.getElementById('filterDistrict').innerHTML = `<option value="">Select District</option>`;
            }
            window.renderData();
        }

        window.renderData = function() {
            if(sessionStorage.getItem('isLoggedin') !== 'true') return; // ensure safe drawing

            const container = document.getElementById('dataList');
            container.innerHTML = '';
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const qCategory = document.getElementById('filterCategory').value;
            const qState = document.getElementById('filterState').value;
            const qPin = document.getElementById('pincodeFilter').value;

            // Draw data locally 
            window.artisansData.forEach(dt => {
                if(searchText && dt.name && !dt.name.toLowerCase().includes(searchText)) return;
                if(qCategory !== 'All' && dt.category !== qCategory) return;
                if(qState && dt.state !== qState) return;
                if(qPin && dt.pincode && !dt.pincode.startsWith(qPin)) return;

                const bx = document.createElement('div');
                bx.className = 'card';
                bx.onclick = () => window.openFolder(dt.dbID);
                
                const avtarImg = dt.imgUrl || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                let badge = dt.isHidden ? '<div class="hidden-badge">Blocked/Hidden</div>' : '';

                bx.innerHTML = `
                    ${badge}
                    <img src="${avtarImg}">
                    <h3>${dt.name || 'Unnamed Seller'}</h3>
                    <p style="font-size:12px; color:#777;">${dt.category} • ${dt.state || 'N/A'}</p>
                    <p style="margin-top:10px; color:var(--primary); font-size:14px;">
                        <i class="fas fa-folder"></i> View Profile
                    </p>
                `;
                container.appendChild(bx);
            });
            if(container.innerHTML === '') {
                container.innerHTML = "<p><i>List is currently empty for this filter!</i></p>";
            }
        }

        // ================= CRUD (FIREBASE) MODAL & BUTTON LOGICS ================ //
        window.openFolder = function(selectedID) {
            document.getElementById('artisanModal').style.display = 'flex';
            document.getElementById('productImagesContainer').innerHTML = '';
            
            if(selectedID) {
                // Editing existing node... Get item out of current synced memory
                document.getElementById('modalTitle').innerText = "Update Folders & Detail";
                const dbRec = window.artisansData.find(v => v.dbID == selectedID);
                document.getElementById('formId').value = selectedID;

                // Push vals to form elements safely
                document.getElementById('formCategory').value = dbRec.category || 'Bags';
                document.getElementById('formState').value = dbRec.state || '';
                document.getElementById('formDistrict').value = dbRec.district || '';
                document.getElementById('formPincode').value = dbRec.pincode || '';
                document.getElementById('formImgUrl').value = dbRec.imgUrl || '';
                document.getElementById('formName').value = dbRec.name || '';
                document.getElementById('formNumber').value = dbRec.phone || '';
                document.getElementById('formWaNumber').value = dbRec.waNumber || '';
                document.getElementById('formWaGroup').value = dbRec.waGroup || '';
                document.getElementById('formMap').value = dbRec.locationMap || '';
                document.getElementById('formInsta').value = dbRec.insta || '';
                document.getElementById('formFb').value = dbRec.fb || '';
                document.getElementById('formBio').value = dbRec.bio || '';
                
                if(dbRec.productImages) {
                    dbRec.productImages.forEach(src => window.addProductImageInput(src));
                } else { window.addProductImageInput(''); }
                
                document.getElementById('btnDelete').style.display = 'block';
                document.getElementById('btnToggleHide').style.display = 'block';
                document.getElementById('btnToggleHide').innerText = dbRec.isHidden ? "Unhide & Allow on Site" : "Hide Data from Users Site";

            } else {
                // For New Entry Record
                document.getElementById('modalTitle').innerText = "Create New Record List";
                document.getElementById('formId').value = '';
                document.getElementById('formPincode').value = '';
                document.getElementById('formDistrict').value = '';
                document.getElementById('formImgUrl').value = '';
                document.getElementById('formName').value = '';
                document.getElementById('formNumber').value = '';
                document.getElementById('formWaNumber').value = '';
                document.getElementById('formWaGroup').value = '';
                document.getElementById('formMap').value = '';
                document.getElementById('formInsta').value = '';
                document.getElementById('formFb').value = '';
                document.getElementById('formBio').value = '';
                window.addProductImageInput();

                document.getElementById('btnDelete').style.display = 'none';
                document.getElementById('btnToggleHide').style.display = 'none';
            }
        }

        window.closeFolder = function() {
            document.getElementById('artisanModal').style.display = 'none';
        }

        window.addProductImageInput = function(imgValue = '') {
            let cx = document.getElementById('productImagesContainer');
            let rw = document.createElement('div');
            rw.className = 'product-img-group';
            rw.innerHTML = `
                <input type="url" class="dyn-product-img" placeholder="Paste product image URL" value="${imgValue}">
                <button class="btn btn-delete" style="margin:0;" onclick="this.parentElement.remove()"> <i class="fas fa-trash"></i></button>`;
            cx.appendChild(rw);
        }

        // ================= DB EXECUTORS (Set, Delete, Update Hidden) =============== //

        window.saveData = function() {
            const userName = document.getElementById('formName').value;
            if(!userName) { alert("Adding a name is mandatory."); return; }
            
            // Format photo lists array
            const photosArry = [];
            document.querySelectorAll('.dyn-product-img').forEach(node => {
                if(node.value.trim().length > 2) { photosArry.push(node.value.trim()); }
            });

            // Gather up to push Object
            const objUpload = {
                category: document.getElementById('formCategory').value,
                pincode: document.getElementById('formPincode').value,
                state: document.getElementById('formState').value,
                district: document.getElementById('formDistrict').value,
                imgUrl: document.getElementById('formImgUrl').value,
                name: userName,
                phone: document.getElementById('formNumber').value,
                waNumber: document.getElementById('formWaNumber').value,
                waGroup: document.getElementById('formWaGroup').value,
                locationMap: document.getElementById('formMap').value,
                insta: document.getElementById('formInsta').value,
                fb: document.getElementById('formFb').value,
                bio: document.getElementById('formBio').value,
                productImages: photosArry
            };

            const theIdInForm = document.getElementById('formId').value;
            const recDbPathID = theIdInForm ? theIdInForm : `U_${Date.now()}`; // Creates ID logic automatically
            
            if(!theIdInForm) {
                 objUpload.isHidden = false; // Always Default False inside creation
            } else {
                 const xOld = window.artisansData.find(w => w.dbID === theIdInForm);
                 objUpload.isHidden = xOld ? xOld.isHidden : false;
            }

            // Real Time UPDATE Firebase Write Operation
            set(ref(db, 'allwaraSellersData/' + recDbPathID), objUpload)
            .then(() => { window.closeFolder(); alert("Details Saved and Pushed live securely!"); })
            .catch(er => alert("Upload DB Error!: " + er));
        }

        window.deleteData = function() {
            let trgID = document.getElementById('formId').value;
            if(!trgID) return;
            
            if(confirm("DANGER CAUTION! Real data permanently removing for "+ trgID + "?")) {
                // Delete From RealTime FIREBASE Table Structure 
                remove(ref(db, 'allwaraSellersData/' + trgID)).then(() => {
                    window.closeFolder(); 
                });
            }
        }

        window.toggleVisibility = function() {
            let tgtObjID = document.getElementById('formId').value;
            if(!tgtObjID) return;
            const inStateFindObj = window.artisansData.find(val => val.dbID == tgtObjID);
            
            let statusPushBool = !inStateFindObj.isHidden;
            
            // Only 'Updating specific node object attribute.' instead of reupload full profile set config.
            update(ref(db, 'allwaraSellersData/' + tgtObjID), { isHidden: statusPushBool }).then(() => {
               window.closeFolder();
            });
        }
        
        // Final Kick-Off UI Screen Function when load page complete... 
        window.addEventListener('DOMContentLoaded', () => {
             if(sessionStorage.getItem('isLoggedin') === 'true') {
                  showPanel(); // Show Direct app content  avoid logic auth UI layer again manually  !
             }
        });
    </script>
</body>
</html>
