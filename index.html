<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allwara - Host Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f6f8;
            --surface: #ffffff;
            --text: #333333;
            --border: #dddddd;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; transition: background 0.3s, color 0.3s; }
        
        body { background: var(--bg); color: var(--text); }

        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--surface); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #loginScreen h2 { margin-bottom: 20px; font-size: 32px; color: var(--primary); }
        .login-box { padding: 30px; background: var(--surface); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border);}
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--text); }
        .btn { padding: 12px; width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-danger { background: var(--danger); }
        
        /* Navbar */
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--surface); box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--text); border: none; background: transparent; }
        header h1 { color: var(--primary); font-size: 24px; margin-left: 10px; }
        .search-box input { padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border); outline: none; background: var(--bg); color: var(--text); }

        /* Sidebar */
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--surface); box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 999; padding-top: 20px; }
        #sidebar.active { left: 0; }
        .close-sidebar { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; background: transparent; border: none; color: var(--text); }
        .sidebar-links { display: flex; flex-direction: column; margin-top: 50px; }
        .sidebar-links a, .sidebar-links button { padding: 15px 20px; text-decoration: none; color: var(--text); font-size: 18px; border-bottom: 1px solid var(--border); background: transparent; border-top: none; border-left: none; border-right: none; text-align: left; cursor: pointer;}
        
        /* Dashboard Wrapper */
        #dashboard { padding: 20px; max-width: 1000px; margin: 0 auto; display: none; }
        
        /* Filters Setup */
        .filter-section { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; background: var(--surface); padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-section select { padding: 10px; flex: 1; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--text); }

        .header-actions { display: flex; justify-content: space-between; margin-bottom: 20px; }

        /* Seller Folders/Cards */
        #sellerList { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .folder-card { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .folder-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .folder-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .folder-info { flex: 1; }
        .folder-info h3 { font-size: 18px; }
        .hidden-badge { background: #f39c12; color: white; padding: 2px 6px; font-size: 10px; border-radius: 4px; }

        /* Modal For Add/Edit Seller */
        #sellerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 10px; }
        .modal-content { background: var(--surface); width: 100%; max-width: 600px; height: 90vh; overflow-y: auto; padding: 20px; border-radius: 8px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--text); }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; }

        .products-arr { margin-top: 10px; padding: 10px; border: 1px dashed var(--border); border-radius: 5px; }
        .products-arr input { margin-bottom: 5px; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-box">
            <h2><b>allwara</b> Host</h2>
            <p style="margin-bottom:20px; color: #888;">Log in to manage database</p>
            <input type="text" id="userid" placeholder="Host ID">
            <input type="password" id="userpass" placeholder="Password">
            <button class="btn" onclick="checkLogin()">Login</button>
            <p id="loginErr" style="color:red; margin-top:10px; display:none;">Invalid ID or Password</p>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div style="display:flex; align-items:center;">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h1>allwara</h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Names..." oninput="filterSellersList()">
        </div>
    </header>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        <h2 style="padding:0 20px; color:var(--primary);">Menu</h2>
        <div class="sidebar-links">
            <button onclick="toggleTheme()"><i class="fas fa-moon"></i> Dark / Light Mode</button>
            <a href="mailto:allwara01@gmail.com"><i class="fas fa-envelope"></i> Help (Support)</a>
            <button onclick="logout()" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        
        <div class="filter-section">
            <select id="mainFilter" onchange="filterSellersList()">
                <option value="">All Categories</option>
                <option value="Bags">Bags</option>
                <option value="Apparel">Apparel</option>
                <option value="Jewellery">Jewellery</option>
                <option value="Footwear">Footwear</option>
            </select>
        </div>

        <div class="header-actions">
            <h2>Seller List Folders</h2>
            <button class="btn" style="width: auto; margin-top:0;" onclick="openModal()"><i class="fas fa-plus"></i> Add New User</button>
        </div>

        <div id="sellerList">
            <!-- Dynamic Folders Appear Here -->
            <p id="loadingMsg">Loading database...</p>
        </div>
    </div>

    <!-- SELLER ADD/EDIT MODAL -->
    <div id="sellerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add / Edit User Profile</h2>
                <button onclick="closeModal()" style="border:none; background:none; font-size:24px; cursor:pointer; color:var(--text);"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="editKey">

            <div class="row">
                <div class="form-group">
                    <label>Profile Image URL *</label>
                    <input type="url" id="sProfileImg" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="sName" placeholder="Artisan/Seller Name" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Phone Number (Call)</label>
                    <input type="tel" id="sPhone" placeholder="+91 0000000000">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="tel" id="sWhatsAppNum" placeholder="+91 0000000000">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>WhatsApp Group Link</label>
                    <input type="url" id="sWhatsAppGroup" placeholder="https://chat.whatsapp.com/...">
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="sCategory">
                        <option value="Bags">Bags</option>
                        <option value="Apparel">Apparel</option>
                        <option value="Jewellery">Jewellery</option>
                        <option value="Footwear">Footwear</option>
                    </select>
                </div>
            </div>

            <hr style="margin: 15px 0; border: 1px solid var(--border);">
            <h3>Location Settings</h3>

            <div class="row" style="margin-top:10px;">
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" value="India" readonly style="opacity: 0.7;">
                </div>
                <div class="form-group">
                    <label>Pincode (Auto fetches Location)</label>
                    <input type="number" id="sPincode" placeholder="6-digit Pin" onkeyup="fetchPincodeData()">
                    <small id="pinLoader" style="color:var(--primary); display:none;">Fetching Location...</small>
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>State (Optional)</label>
                    <input type="text" id="sState" placeholder="Enter or auto-filled">
                </div>
                <div class="form-group">
                    <label>District (Optional)</label>
                    <input type="text" id="sDistrict" placeholder="Enter or auto-filled">
                </div>
            </div>

            <div class="form-group">
                <label>Location Link (Google Map URL)</label>
                <input type="url" id="sMap" placeholder="https://maps.app.goo.gl/...">
            </div>

            <hr style="margin: 15px 0; border: 1px solid var(--border);">

            <div class="row">
                <div class="form-group">
                    <label>Instagram Page Link</label>
                    <input type="url" id="sInsta" placeholder="https://instagram.com/...">
                </div>
                <div class="form-group">
                    <label>Facebook Page Link</label>
                    <input type="url" id="sFb" placeholder="https://facebook.com/...">
                </div>
            </div>

            <div class="form-group">
                <label>Bio (Text)</label>
                <textarea id="sBio" rows="3" placeholder="Details about products & user..."></textarea>
            </div>

            <div class="form-group">
                <label>Product Photos URLs</label>
                <div class="products-arr" id="productsImagesDiv">
                    <!-- Product URL Inputs Will Go Here -->
                </div>
                <button type="button" class="btn" style="background:#8e44ad; font-size:14px; margin-top:5px; width:auto;" onclick="addProductImageInput('')"><i class="fas fa-plus"></i> Add Photo Link</button>
            </div>

            <div class="form-group" style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                <input type="checkbox" id="sHide" style="width:20px; height:20px; cursor:pointer;"> 
                <label for="sHide" style="margin:0; font-size:16px; cursor:pointer;"><b>Hide from Public (Draft)</b></label>
            </div>

            <div class="modal-actions">
                <button class="btn" onclick="saveData()">Save / Update Folder</button>
                <button class="btn btn-danger" id="delBtn" onclick="deleteData()" style="display:none;">Delete File</button>
            </div>
        </div>
    </div>


    <!-- FIREBASE AND JS SCRIPT MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Your Web App Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDEfr7xM38sv2V36MdbY0dKs-MoOqaEBC4",
            authDomain: "allwara.firebaseapp.com",
            databaseURL: "https://allwara-default-rtdb.firebaseio.com",
            projectId: "allwara",
            storageBucket: "allwara.firebasestorage.app",
            messagingSenderId: "750105109586",
            appId: "1:750105109586:web:ed06d9be7fee6427032b8b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let globalSellersData = []; // RAM copy for filters

        // Setup real-time listener on successful login structure setup
        window.startDatabase = function() {
            document.getElementById('loadingMsg').style.display = 'block';
            const dbRef = ref(db, 'sellers');
            onValue(dbRef, (snapshot) => {
                globalSellersData = [];
                if(snapshot.exists()){
                    const data = snapshot.val();
                    for(let key in data){
                        globalSellersData.push({ id: key, ...data[key] });
                    }
                }
                filterSellersList();
                document.getElementById('loadingMsg').style.display = 'none';
            });
        }

        window.filterSellersList = function() {
            const listDiv = document.getElementById('sellerList');
            const searchBox = document.getElementById('searchInput').value.toLowerCase();
            const catFilter = document.getElementById('mainFilter').value;
            listDiv.innerHTML = '';

            let resultCount = 0;

            globalSellersData.forEach(item => {
                // Ignore missing vital fields dynamically per host check, although standard DB practice fixes this.
                if(!item.name) return;

                let matchSearch = item.name.toLowerCase().includes(searchBox);
                let matchCat = catFilter === "" || item.category === catFilter;

                if(matchSearch && matchCat) {
                    resultCount++;
                    // Render "Folder/Profile Card"
                    const hideBadge = item.isHidden ? '<span class="hidden-badge">HIDDEN</span>' : '';
                    let imgURL = item.profileImg || 'https://via.placeholder.com/60?text=No+Img';
                    
                    listDiv.innerHTML += `
                        <div class="folder-card" onclick="openModal('${item.id}')">
                            <img src="${imgURL}" class="folder-img" onerror="this.src='https://via.placeholder.com/60?text=Err'">
                            <div class="folder-info">
                                <h3>${item.name} ${hideBadge}</h3>
                                <p style="font-size:12px; color:var(--text); opacity:0.8; margin-top:4px;">
                                    <i class="fas fa-tag"></i> ${item.category} 
                                    | <i class="fas fa-map-marker-alt"></i> ${item.state || 'N/A'}
                                </p>
                            </div>
                        </div>
                    `;
                }
            });

            if(resultCount === 0 && document.getElementById('loadingMsg').style.display === 'none'){
                 listDiv.innerHTML = '<p>No data matches the filters.</p>';
            }
        }

        // Host Edit Panel Logics
        window.openModal = function(id = null) {
            document.getElementById('sellerModal').style.display = 'flex';
            const inputs = ['editKey','sProfileImg', 'sName', 'sPhone', 'sWhatsAppNum', 'sWhatsAppGroup', 'sCategory', 'sPincode', 'sState', 'sDistrict', 'sMap', 'sInsta', 'sFb', 'sBio'];
            inputs.forEach(k => document.getElementById(k).value = '');
            document.getElementById('sHide').checked = false;
            document.getElementById('productsImagesDiv').innerHTML = '';
            document.getElementById('delBtn').style.display = 'none';
            document.getElementById('modalTitle').innerText = 'Add New Folder Profile';

            // Add ONE empty product image field to start
            addProductImageInput('');

            if(id) {
                // Is an Edit Process
                const target = globalSellersData.find(x => x.id === id);
                if(target) {
                    document.getElementById('modalTitle').innerText = 'Edit Folder: ' + target.name;
                    document.getElementById('editKey').value = target.id;
                    document.getElementById('delBtn').style.display = 'block';

                    document.getElementById('sProfileImg').value = target.profileImg || '';
                    document.getElementById('sName').value = target.name || '';
                    document.getElementById('sPhone').value = target.phone || '';
                    document.getElementById('sWhatsAppNum').value = target.whatsappNum || '';
                    document.getElementById('sWhatsAppGroup').value = target.whatsappGroup || '';
                    if(target.category) document.getElementById('sCategory').value = target.category;
                    
                    document.getElementById('sPincode').value = target.pincode || '';
                    document.getElementById('sState').value = target.state || '';
                    document.getElementById('sDistrict').value = target.district || '';
                    
                    document.getElementById('sMap').value = target.mapLink || '';
                    document.getElementById('sInsta').value = target.instaLink || '';
                    document.getElementById('sFb').value = target.fbLink || '';
                    document.getElementById('sBio').value = target.bio || '';
                    
                    document.getElementById('sHide').checked = target.isHidden === true;

                    // product Images Loader
                    document.getElementById('productsImagesDiv').innerHTML = '';
                    if(target.products && target.products.length > 0) {
                        target.products.forEach(url => addProductImageInput(url));
                    } else {
                         addProductImageInput('');
                    }
                }
            }
        }

        window.saveData = function() {
            const id = document.getElementById('editKey').value;
            let prImg = document.getElementById('sProfileImg').value.trim();
            let name = document.getElementById('sName').value.trim();
            
            if(prImg==="" || name===""){
                alert("Profile Image URL and Name are compulsory!"); return;
            }

            // Extract Products URLs (ignores blank ones automatically)
            let prods = [];
            const productInputs = document.querySelectorAll('.productUrlField');
            productInputs.forEach(i => {
                if(i.value.trim() !== "") prods.push(i.value.trim());
            });

            const dataPacket = {
                profileImg: prImg,
                name: name,
                phone: document.getElementById('sPhone').value.trim(),
                whatsappNum: document.getElementById('sWhatsAppNum').value.trim(),
                whatsappGroup: document.getElementById('sWhatsAppGroup').value.trim(),
                category: document.getElementById('sCategory').value,
                pincode: document.getElementById('sPincode').value.trim(),
                state: document.getElementById('sState').value.trim(),
                district: document.getElementById('sDistrict').value.trim(),
                mapLink: document.getElementById('sMap').value.trim(),
                instaLink: document.getElementById('sInsta').value.trim(),
                fbLink: document.getElementById('sFb').value.trim(),
                bio: document.getElementById('sBio').value.trim(),
                isHidden: document.getElementById('sHide').checked,
                products: prods
            };

            // Clean packet to exclude blanks strictly based on rule "if empty do not show/store unnecessarily"
            // Wait, storing blank as empty string safely clears old records during edits
            
            if(id) {
                // Update 
                const docRef = ref(db, 'sellers/' + id);
                update(docRef, dataPacket).then(() => {
                    alert('Profile updated successfully!');
                    closeModal();
                }).catch(e=> alert(e.message));
            } else {
                // New Add
                const rootRef = ref(db, 'sellers');
                const newRef = push(rootRef);
                set(newRef, dataPacket).then(() => {
                    alert('New Seller added!');
                    closeModal();
                }).catch(e=> alert(e.message));
            }
        }

        window.deleteData = function() {
             const id = document.getElementById('editKey').value;
             if(!id) return;
             if(confirm('Are you sure you want to Delete this complete folder?')){
                remove(ref(db, 'sellers/'+id)).then(() => {
                    alert("Deleted Successfully!");
                    closeModal();
                }).catch(e=>alert(e.message));
             }
        }

    </script>

    <script>
        /* DOM Level Simple UI Functions */
        function checkLogin() {
            let uid = document.getElementById('userid').value;
            let pass = document.getElementById('userpass').value;

            if (uid === 'allwara' && pass === 'rahe67 99') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                localStorage.setItem('allwara_host_logged', 'true');
                if(window.startDatabase) window.startDatabase(); // call mapped module function
            } else {
                document.getElementById('loginErr').style.display = 'block';
            }
        }

        window.onload = () => {
            // Check Auto Login
            if(localStorage.getItem('allwara_host_logged') === 'true') {
                 document.getElementById('userid').value = 'allwara';
                 document.getElementById('userpass').value = 'rahe67 99';
                 checkLogin();
            }

            // check dark mode
            if(localStorage.getItem('allwaraTheme') === 'dark'){
                 document.documentElement.setAttribute('data-theme', 'dark');
            }
        };

        function logout() {
            localStorage.removeItem('allwara_host_logged');
            location.reload();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'light') {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('allwaraTheme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                localStorage.setItem('allwaraTheme', 'light');
            }
        }

        function closeModal() {
            document.getElementById('sellerModal').style.display = 'none';
        }

        function addProductImageInput(val) {
            let d = document.getElementById('productsImagesDiv');
            let div = document.createElement('div');
            div.style.display = "flex";
            div.style.gap = "5px";
            div.style.marginBottom = "5px";

            let inp = document.createElement('input');
            inp.type = "url";
            inp.className = "productUrlField";
            inp.placeholder = "Image URL (Bags, Shoes, etc...)";
            inp.value = val;
            inp.style.flex = "1";

            let rem = document.createElement('button');
            rem.innerHTML = "<i class='fas fa-trash'></i>";
            rem.style.color = "var(--danger)";
            rem.style.background = "none";
            rem.style.border = "none";
            rem.style.cursor = "pointer";
            rem.style.padding = "10px";

            rem.onclick = function() { div.remove(); }
            
            div.appendChild(inp);
            div.appendChild(rem);
            d.appendChild(div);
        }

        // Automatic Postal PinCode API Feature ! (Filters india state auto detect)
        async function fetchPincodeData() {
            const pin = document.getElementById('sPincode').value;
            const msg = document.getElementById('pinLoader');
            
            if(pin.length === 6) {
                msg.style.display = 'block';
                try {
                    let res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
                    let data = await res.json();
                    
                    if(data[0].Status === 'Success') {
                        document.getElementById('sState').value = data[0].PostOffice[0].State;
                        document.getElementById('sDistrict').value = data[0].PostOffice[0].District;
                        msg.innerText = "Location Filled Successfully!";
                        msg.style.color = "green";
                    } else {
                         msg.innerText = "Invalid Pincode.";
                         msg.style.color = "red";
                    }
                } catch(e) {
                     msg.style.display = 'none';
                }
            } else {
                 msg.style.display = 'none';
                 msg.innerText = "Fetching Location...";
            }
        }
    </script>

</body>
</html>
